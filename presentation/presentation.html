        # The Problem

        ---

        # Building Production Agents Is Hard

        An API call gets you started. But production requires much more:

        --

        - **Orchestration** &#8212; chaining multiple LLM calls + tool executions

        --

        - **Multi-agent routing** &#8212; delegating tasks to specialized agents

        --

        - **Guardrails** &#8212; input/output validation, safety checks

        --

        - **Observability** &#8212; tracing, debugging, cost monitoring

        --

        - **User Interface** &#8212; a chat experience your users actually interact with

        --

        Released **March 2025**. Replaces both Chat Completions API and Assistants API.

        --

        <ul style="font-size: 16px; color: #2A2825;">

        # ChatKit &#8212; Embeddable Chat UI

        **Frontend-only** &#8212; React components + framework-agnostic Web Component.

        --

        ```jsx
        import { ChatKit, useChatKit } from '@openai/chatkit-react';

        const chatkit = useChatKit({
          api: { getClientSecret },
          .....

        return <ChatKit control={chatkit.control} />;
        ```

        --

        <div style="background: #E8F1F9; border: 2px solid #000000; border-radius: 0px; padding: 16px;">
        <strong>Includes:</strong> file upload, light/dark theming, tool invocation display, chain-of-thought visualization, suggestion chips, event system, and more.
        </div>

        # ChatKit &#8212; Backend Token Exchange

        ```typescript
        // POST /api/create-session (your backend)
        const response = await fetch(
          "https://api.openai.com/v1/chatkit/sessions",
          {
            method: "POST",
            headers: {
              ....
        );

        const { client_secret } = await response.json();
        // Return client_secret to the frontend
        ```

        --

        <div style="background: #FBEAE7; border: 2px solid #000000; border-radius: 0px; padding: 16px;">
        <strong>Key pattern:</strong> Your server-side API key is exchanged for a short-lived client token. Per-user sessions via cookies. The frontend <em>never</em> sees your API key.
        </div>

        # Key Takeaways

        --

        - **Start with Responses API** for maximum control and the deepest learning

        --

        - **Add Agents SDK** when you need multi-agent orchestration, guardrails, tracing

        --

        - **Use AgentKit / ChatKit** when you're ready to ship to real users

        --

        - Each layer **builds on the previous** &#8212; no vendor lock-in at the SDK level

        --

        - The whole stack is available at **standard API pricing** &#8212; no platform fee
